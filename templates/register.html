{% extends "base.html" %}

{% block title %}Register | StorySpeech AI{% endblock %}

{% block content %}
<section class="auth-section">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-5 col-md-7">
                <div class="auth-card">
                    <div class="text-center mb-4">
                        <span class="brand-mark mx-auto"><i class="bi bi-person-plus"></i></span>
                        <h1 class="h3 mt-3">Create account</h1>
                        <p class="text-muted mb-0">Save story history and download generated outputs.</p>
                    </div>
                    <form method="post" novalidate>
                        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                        <div class="mb-3">
                            <label class="form-label" for="username">Username</label>
                            <input class="form-control" id="username" name="username" minlength="3" maxlength="30" autocomplete="username" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label" for="email">Email</label>
                            <input class="form-control" id="email" name="email" type="email" autocomplete="email" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label" for="password">Password</label>
                            <input class="form-control" id="password" name="password" type="password" minlength="8" autocomplete="new-password" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label" for="confirm_password">Confirm Password</label>
                            <input class="form-control" id="confirm_password" name="confirm_password" type="password" minlength="8" autocomplete="new-password" required>
                        </div>
                        <button class="btn btn-brand w-100" type="submit">
                            <i class="bi bi-person-check"></i> Register
                        </button>
                    </form>
                    <p class="text-center mt-4 mb-0 small">
                        Already registered? <a href="{{ url_for('login') }}">Login</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}

{% extends "base.html" %}

{% block title %}{{ code }} | StorySpeech AI{% endblock %}

{% block content %}
<section class="auth-section">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="auth-card text-center">
                    <span class="brand-mark mx-auto"><i class="bi bi-exclamation-triangle"></i></span>
                    <h1 class="display-6 mt-3">{{ code }}</h1>
                    <p class="text-muted">{{ message }}</p>
                    <a class="btn btn-brand" href="{{ url_for('index') }}">
                        <i class="bi bi-house"></i> Home
                    </a>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}

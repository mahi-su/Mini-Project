{% extends "base.html" %}

{% block title %}Login | StorySpeech AI{% endblock %}

{% block content %}
<section class="auth-section">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-5 col-md-7">
                <div class="auth-card">
                    <div class="text-center mb-4">
                        <span class="brand-mark mx-auto"><i class="bi bi-soundwave"></i></span>
                        <h1 class="h3 mt-3">Welcome back</h1>
                        <p class="text-muted mb-0">Login to continue your story generation session.</p>
                    </div>
                    <form method="post" novalidate>
                        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                        <div class="mb-3">
                            <label class="form-label" for="email">Email</label>
                            <input class="form-control" id="email" name="email" type="email" autocomplete="email" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label" for="password">Password</label>
                            <input class="form-control" id="password" name="password" type="password" autocomplete="current-password" required>
                        </div>
                        <button class="btn btn-brand w-100" type="submit">
                            <i class="bi bi-box-arrow-in-right"></i> Login
                        </button>
                    </form>
                    <p class="text-center mt-4 mb-0 small">
                        New here? <a href="{{ url_for('register') }}">Create an account</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
